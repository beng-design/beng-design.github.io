<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[Your Name] — Design Engineer</title>
  <meta id="meta-desc" name="description" content="[One-line positioning statement — what you do and for whom]">
  <link rel="icon" type="image/svg+xml" href="assets/site/favicon.svg">

  <!-- Open Graph -->
  <meta property="og:title" content="[Your Name] — Design Engineer">
  <meta property="og:description" content="[One-line positioning statement — what you do and for whom]">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://beng-design.github.io/">
  <meta property="og:image" content="https://beng-design.github.io/assets/site/og-image.png">

  <!-- Twitter/X -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="[Your Name] — Design Engineer">
  <meta name="twitter:description" content="[One-line positioning statement — what you do and for whom]">
  <!-- Replace og-image.png with a real 1200×630 preview image before launch -->
  <meta name="twitter:image" content="https://beng-design.github.io/assets/site/og-image.png">
  <style>@view-transition { navigation: auto; }</style>
  <script src="js/transitions.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <!-- ─── Nav ─────────────────────────────────────────────── -->
  <nav class="site-nav" aria-label="Main">
    <a href="/" class="wordmark" id="nav-wordmark"></a>
    <div class="nav-links" id="nav-links">
      <a href="#work">Work</a>
      <a href="#about">About</a>
    </div>
    <button class="nav-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="nav-links">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <path d="M2 4.5h14M2 9h14M2 13.5h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </nav>

  <main>

    <!-- ─── Hero ────────────────────────────────────────────── -->
    <section class="hero">
      <div class="wrap">
        <p class="hero-eyebrow" id="hero-eyebrow"></p>
        <h1 class="hero-name" id="hero-name"></h1>
        <p class="hero-statement" id="hero-statement"></p>
        <div class="hero-cta">
          <span class="status-dot" aria-hidden="true"></span>
          <span>Available for roles</span>
          <span class="dot">·</span>
          <a id="hero-email" href="#"></a>
        </div>
      </div>
    </section>

    <!-- ─── Work ─────────────────────────────────────────────── -->
    <section class="section" id="work">
      <div class="wrap">
        <span class="section-label">Selected Work</span>
        <div class="projects"></div>
        <button class="back-to-top" aria-label="Back to top" onclick="window.scrollTo({top:0,behavior:'smooth'})">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <path d="M2.5 9L7 4.5L11.5 9" stroke="currentColor" stroke-width="1.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </section>

    <!-- ─── About ─────────────────────────────────────────────── -->
    <section class="section" id="about">
      <div class="wrap">
        <span class="section-label">About</span>
        <div class="about-body">
          <p id="about-bio"></p>
          <p id="about-context"></p>
          <div class="about-links">
            <a id="link-github" class="about-link" href="#">GitHub</a>
            <a id="link-linkedin" class="about-link" href="#">LinkedIn</a>
            <a id="link-resume" class="about-link" href="#">Resume</a>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- ─── Footer ──────────────────────────────────────────────── -->
  <footer>
    <span class="foot-text" id="footer-name"></span>
    <span class="foot-text" id="footer-year"></span>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
